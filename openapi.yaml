openapi: 3.1.0
info:
  title: Pricing Optimizer API
  version: 0.1.0
  summary: Generate AI-powered pricing pages from a product URL.
  description: |
    Pricing Optimizer analyzes a product URL and generates three pricing-page
    variations, each applying a distinct psychological pricing strategy
    (anchor pricing, freemium ladder, value-based). Variations are produced with
    structured LLM tool calling and streamed to the client over Server-Sent Events.

    This document is the single source of truth for the HTTP contract. The Go backend
    generates handlers and types from it via oapi-codegen; the frontend generates its
    client via openapi-typescript. No route ships without a spec update first.
  license:
    name: MIT
  contact:
    name: Rodrigo Vieira
    url: https://github.com/rodvieira

servers:
  - url: http://localhost:8080
    description: Local development
  # Production server (Cloud Run, see ADR-0009) is added here once deployed —
  # deliberately omitted rather than guessed ahead of the real assigned URL.

tags:
  - name: analysis
    description: Scrape and classify a product site.
  - name: generation
    description: Generate and retrieve pricing-page variations.
  - name: export
    description: Export a chosen variation.
  - name: ops
    description: Operational endpoints.

paths:
  /v1/analyze:
    post:
      operationId: analyzeSite
      tags: [analysis]
      summary: Analyze a product URL and return a site profile.
      description: |
        Fetches the URL (chromedp for SPAs, colly for static pages), extracts the value
        proposition, and classifies industry and audience. The resulting SiteProfile is
        the input to generation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
      responses:
        '200':
          description: Site analyzed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '502':
          description: The target site could not be fetched or parsed.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/generate:
    post:
      operationId: generateVariations
      tags: [generation]
      summary: Generate three pricing-page variations (SSE stream).
      description: |
        Generates three variations in parallel, each with a distinct strategy, and streams
        progress as Server-Sent Events. The stream emits StreamChunk events until a
        terminal `done` (or `error`) event. The completed Generation is also retrievable
        afterwards via GET /v1/generations/{id}.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: |
            An event stream of StreamChunk objects. Each SSE `data:` line contains one
            JSON-encoded StreamChunk. The stream ends with a chunk of type `done`.
          headers:
            X-Generation-Id:
              description: The id assigned to this generation, also emitted in the stream.
              schema:
                type: string
                format: uuid
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/StreamChunk'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/generations/{id}:
    get:
      operationId: getGeneration
      tags: [generation]
      summary: Fetch a previously produced generation.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The generation and its variations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Generation'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/export/{id}:
    post:
      operationId: exportVariation
      tags: [export]
      summary: Export one variation of a generation in the requested format.
      description: |
        Renders a single variation as a JSX component, standalone HTML, or a Stripe
        Pricing Table JSON configuration. No Stripe API calls are made; only config is
        produced.
      parameters:
        - name: id
          in: path
          required: true
          description: The generation id.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '200':
          description: The exported artifact.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /v1/healthz:
    get:
      operationId: healthCheck
      tags: [ops]
      summary: Liveness and readiness probe.
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '503':
          description: Service is degraded or a dependency is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

components:
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Client-supplied key to make generation idempotent. Repeating a request with the
        same key once the first has completed returns the same generation instead of
        producing a new one. A repeat request with the same key while the first is still
        in progress gets 409 Conflict instead of starting a second, redundant generation.

        Omitting this header does not disable deduplication: the server derives an
        implicit key from the request's siteProfile, strategies, and currency, so two
        requests with identical content are deduplicated the same way even without a
        shared client-chosen key. A practical consequence: two different callers
        submitting the same public product URL with the same strategies can transparently
        receive the same generation, or a 409 if the first is still running, even though
        neither supplied an Idempotency-Key. See ADR-0010.
      schema:
        type: string
        minLength: 8
        maxLength: 255

  responses:
    BadRequest:
      description: The request was malformed.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    UnprocessableEntity:
      description: The request was well-formed but semantically invalid.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: The requested resource does not exist.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    TooManyRequests:
      description: Rate limit exceeded.
      headers:
        Retry-After:
          description: Seconds to wait before retrying.
          schema:
            type: integer
            minimum: 0
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: |
        A generation with the same Idempotency-Key is already in progress. Wait for it to
        finish, then retry with the same key to get its result, or use a new key to start
        an unrelated generation.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    InternalError:
      description: An unexpected error occurred.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  schemas:
    AnalyzeRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: The product URL to analyze.
          examples:
            - https://example.com
      additionalProperties: false

    SiteProfile:
      type: object
      required: [url, title, valueProposition, industry, audience, sourceType, analyzedAt]
      properties:
        url:
          type: string
          format: uri
        title:
          type: string
        valueProposition:
          type: string
          description: One-to-two sentence summary of what the product offers.
        industry:
          type: string
          description: Classified industry, e.g. "developer-tools", "e-commerce".
        audience:
          $ref: '#/components/schemas/Audience'
        keywords:
          type: array
          items:
            type: string
          description: Salient terms extracted from the page.
        sourceType:
          type: string
          enum: [spa, static]
          description: Which scraper handled the page.
        analyzedAt:
          type: string
          format: date-time
      additionalProperties: false

    Audience:
      type: object
      required: [segment, sophistication]
      properties:
        segment:
          type: string
          description: e.g. "SaaS founders", "enterprise IT", "indie developers".
        sophistication:
          type: string
          enum: [low, medium, high]
          description: Price/technical sophistication of the audience.
        pricePosition:
          type: string
          enum: [budget, mid_market, premium]
      additionalProperties: false

    PricingStrategy:
      type: string
      description: The psychological pricing strategy applied to a variation.
      enum: [anchor, freemium, value_based]

    GenerateRequest:
      type: object
      required: [siteProfile]
      properties:
        siteProfile:
          $ref: '#/components/schemas/SiteProfile'
        strategies:
          type: array
          description: |
            Strategies to generate. Defaults to all three when omitted. Duplicates are
            rejected.
          items:
            $ref: '#/components/schemas/PricingStrategy'
          minItems: 1
          maxItems: 3
        currency:
          type: string
          description: ISO 4217 currency code for generated prices.
          default: USD
          pattern: '^[A-Z]{3}$'
      additionalProperties: false

    Generation:
      type: object
      required: [id, sourceUrl, status, variations, createdAt]
      properties:
        id:
          type: string
          format: uuid
        sourceUrl:
          type: string
          format: uri
        siteProfile:
          $ref: '#/components/schemas/SiteProfile'
        status:
          type: string
          enum: [pending, streaming, completed, failed]
        variations:
          type: array
          items:
            $ref: '#/components/schemas/Variation'
        createdAt:
          type: string
          format: date-time
      additionalProperties: false

    Variation:
      type: object
      required: [id, strategy, headline, tiers]
      properties:
        id:
          type: string
          format: uuid
        strategy:
          $ref: '#/components/schemas/PricingStrategy'
        headline:
          type: string
        subheadline:
          type: string
        tiers:
          type: array
          minItems: 1
          maxItems: 5
          items:
            $ref: '#/components/schemas/PricingTier'
        rationale:
          type: string
          description: Why this strategy fits the analyzed audience.
      additionalProperties: false

    PricingTier:
      type: object
      required: [name, price, features]
      properties:
        name:
          type: string
          description: e.g. "Free", "Pro", "Enterprise".
        price:
          $ref: '#/components/schemas/Price'
        tagline:
          type: string
        features:
          type: array
          items:
            type: string
        cta:
          type: string
          description: Call-to-action label, e.g. "Start free".
        highlighted:
          type: boolean
          default: false
          description: Whether this tier is visually emphasized as the recommended plan.
        badge:
          type: string
          description: Optional badge text, e.g. "Most popular".
      additionalProperties: false

    Price:
      type: object
      required: [amount, currency, interval]
      properties:
        amount:
          type: integer
          minimum: 0
          description: Amount in the currency's minor unit (e.g. cents). 0 means free.
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
        interval:
          type: string
          enum: [one_time, monthly, yearly]
        customLabel:
          type: string
          description: Overrides the rendered price, e.g. "Contact us".
      additionalProperties: false

    StreamChunk:
      type: object
      description: |
        One event in the generation SSE stream. `type` discriminates the payload:
        - `generation_started`: carries `generationId`.
        - `variation_started`: a variation began; carries `strategy`.
        - `token`: an incremental text delta for a variation; carries `strategy`, `delta`.
        - `variation_completed`: a finished variation; carries `variation`.
        - `done`: terminal success; carries the full `generation`.
        - `error`: terminal failure; carries `problem`.
      required: [type]
      properties:
        type:
          type: string
          enum:
            - generation_started
            - variation_started
            - token
            - variation_completed
            - done
            - error
        generationId:
          type: string
          format: uuid
        strategy:
          $ref: '#/components/schemas/PricingStrategy'
        delta:
          type: string
        variation:
          $ref: '#/components/schemas/Variation'
        generation:
          $ref: '#/components/schemas/Generation'
        problem:
          $ref: '#/components/schemas/Problem'
      additionalProperties: false

    ExportRequest:
      type: object
      required: [variationId, format]
      properties:
        variationId:
          type: string
          format: uuid
        format:
          type: string
          enum: [jsx, html, stripe]
      additionalProperties: false

    ExportResult:
      type: object
      required: [format, filename, contentType, content]
      properties:
        format:
          type: string
          enum: [jsx, html, stripe]
        filename:
          type: string
          description: Suggested filename, e.g. "PricingSection.tsx".
        contentType:
          type: string
          description: MIME type of the content, e.g. "text/plain".
        content:
          type: string
          description: The exported artifact as text (JSX, HTML, or Stripe config JSON).
      additionalProperties: false

    HealthStatus:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        version:
          type: string
          description: Build version or git SHA.
        checks:
          type: object
          additionalProperties:
            type: string
            enum: [ok, fail, skipped]
          description: Per-dependency health, keyed by dependency name.
      additionalProperties: false

    Problem:
      type: object
      description: RFC 7807 problem details.
      required: [title, status]
      properties:
        type:
          type: string
          format: uri
          default: about:blank
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
        traceId:
          type: string
          description: Correlation id for logs and traces.
      additionalProperties: true
