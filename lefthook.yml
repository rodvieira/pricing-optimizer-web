# Git hooks for pricing-optimizer-web. Install with: pnpm exec lefthook install

pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,jsx,ts,tsx,json,css}"
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm exec tsc --noEmit

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-push:
  commands:
    test:
      # Tests are colocated with source (e.g. features/url-input/url-input-schema.test.ts)
      # rather than mirrored under test/unit/, so the guard checks for any *.test.ts(x)
      # file anywhere instead of one fixed path.
      run: |
        if [ -n "$(git ls-files '*.test.ts' '*.test.tsx' 2>/dev/null)" ]; then
          pnpm exec vitest run
        else
          echo "no unit tests yet; skipping"
        fi
